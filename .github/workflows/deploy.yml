name: Deploy to InfinityFree

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write production db.php
        run: |
          cat > config/db.php << 'PHPEOF'
          <?php
          $host     = "${{ secrets.DB_HOST }}";
          $user     = "${{ secrets.DB_USER }}";
          $password = "${{ secrets.DB_PASS }}";
          $database = "${{ secrets.DB_NAME }}";

          $conn = new mysqli($host, $user, $password, $database);
          if ($conn->connect_error) {
              die("Connection failed: " . $conn->connect_error);
          }
          $conn->set_charset('utf8mb4');

          // Auto-create employees table
          $conn->query("CREATE TABLE IF NOT EXISTS employees (
              id INT AUTO_INCREMENT PRIMARY KEY,
              name VARCHAR(200) NOT NULL,
              position VARCHAR(200),
              phone VARCHAR(30),
              salary DECIMAL(12,2) DEFAULT 0,
              hire_date DATE,
              status ENUM('active','inactive') DEFAULT 'active',
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          )");

          // Auto-create invoices table
          $conn->query("CREATE TABLE IF NOT EXISTS invoices (
              id INT AUTO_INCREMENT PRIMARY KEY,
              invoice_number VARCHAR(30) NOT NULL UNIQUE,
              contract_id INT NOT NULL,
              issue_date DATE NOT NULL,
              total DECIMAL(12,2) NOT NULL DEFAULT 0,
              status ENUM('active','cancelled') NOT NULL DEFAULT 'active',
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          )");

          // Auto-create users table
          $conn->query("CREATE TABLE IF NOT EXISTS users (
              id INT AUTO_INCREMENT PRIMARY KEY,
              username VARCHAR(100) NOT NULL UNIQUE,
              password VARCHAR(255) NOT NULL,
              full_name VARCHAR(200) NOT NULL,
              role ENUM('admin','user') NOT NULL DEFAULT 'user',
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          )");

          // Auto-create settings table
          $conn->query("CREATE TABLE IF NOT EXISTS settings (
              id INT AUTO_INCREMENT PRIMARY KEY,
              setting_key VARCHAR(100) NOT NULL UNIQUE,
              setting_value TEXT,
              updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
          )");

          // Insert default company settings
          $defaults = [
              'company_name'            => 'مؤسسة الجود للسقالات',
              'vat_number'              => '314325455800012',
              'company_phone'           => '',
              'company_address'         => '',
              'commercial_registration' => '',
          ];
          foreach ($defaults as $key => $val) {
              $k = $conn->real_escape_string($key);
              $v = $conn->real_escape_string($val);
              $conn->query("INSERT IGNORE INTO settings(setting_key, setting_value) VALUES('$k','$v')");
          }

          // Auto-create expense_categories table
          $conn->query("CREATE TABLE IF NOT EXISTS expense_categories (
              id INT AUTO_INCREMENT PRIMARY KEY,
              name VARCHAR(200) NOT NULL,
              sort_order INT DEFAULT 0
          )");

          // Seed default categories if empty
          $catCount = $conn->query("SELECT COUNT(*) c FROM expense_categories")->fetch_assoc()['c'];
          if ($catCount == 0) {
              $cats = ['وقود ومحروقات','صيانة المعدات والسقالات','إيجار مستودع','رواتب وأجور',
                       'نقل وشحن','كهرباء وماء','قطع غيار وتوريدات','تأمين',
                       'اتصالات وإنترنت','مستلزمات مكتبية','رسوم حكومية وتراخيص',
                       'صيانة سيارات','مصاريف متنوعة'];
              foreach ($cats as $i => $name) {
                  $n = $conn->real_escape_string($name);
                  $conn->query("INSERT INTO expense_categories(name, sort_order) VALUES('$n', ".($i+1).")");
              }
          }

          // Ensure admin user exists (by username, not by count)
          $adminExists = $conn->query("SELECT id FROM users WHERE username='admin' LIMIT 1");
          if ($adminExists && $adminExists->num_rows === 0) {
              $hash = password_hash('admin123', PASSWORD_DEFAULT);
              $hash = $conn->real_escape_string($hash);
              $conn->query("INSERT INTO users(full_name, username, password, role) VALUES('مدير النظام', 'admin', '$hash', 'admin')");
          }

          if (!function_exists('getSetting')) {
              function getSetting($conn, $key) {
                  $k   = $conn->real_escape_string($key);
                  $res = $conn->query("SELECT setting_value FROM settings WHERE setting_key='$k' LIMIT 1");
                  return $res && $res->num_rows ? $res->fetch_assoc()['setting_value'] : '';
              }
          }
          ?>
          PHPEOF

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            set_secrets.py
            set_db_secrets.py
            deploy.py
